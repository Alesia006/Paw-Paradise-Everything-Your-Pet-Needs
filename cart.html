<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Paw Paradise</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  margin: 0;
}

/* Navbar */
.navbar {
  backdrop-filter: blur(10px);
}

/* Hero heading */
.hero-heading {
  text-align: center;
  margin: 30px 0 20px;
}
.hero-heading h2 {
  font-size: 2.5rem;
  font-weight: bold;
  text-shadow: 1px 1px 8px rgba(0,0,0,0.5);
}

/* Cart Item */
.cart-item {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.cart-item img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
}

/* Buttons */
.quantity-btn {
  padding: 5px 10px;
  border-radius: 8px;
}

.cart-item button {
  margin-left: 5px;
}

/* Total Box Centered */
.center-box {
  flex: 1; /* Zgjat gjithë hapësirën e mbetur */
  display: flex;
  justify-content: center;
  align-items: center;
}

.total-box {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  width: 400px; /* më i madh se më parë */
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.total-box h4 {
  color: #28a745;
  font-weight: bold;
  margin-bottom: 25px;
  font-size: 1.8rem;
}

.total-box button,
.total-box a {
  border-radius: 12px;
  padding: 10px 0;
  font-size: 1.1rem;
  margin-bottom: 15px;
  width: 100%;
}

/* Footer */
footer {
  color: white;
  text-align: center;
  padding: 15px 0;
  background: rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
  <a class="navbar-brand fw-bold" href="index.html">🐾 Paw Paradise - Everything Your Pet Needs 🐾</a>
  <div class="ms-auto">
    <a href="products.html" class="btn btn-light btn-sm mx-1">Back to Shop</a>
    <a href="checkout.html" class="btn btn-success btn-sm mx-1">Checkout</a>
  </div>
</nav>

<!-- Hero Heading -->
<div class="container hero-heading">
  <h2>Your Cart 🛒</h2>
  <p class="lead">Review your items and complete your purchase!</p>
</div>

<!-- Cart Items (optional if you want to show them above the total box) -->
<div class="container my-3" id="cart-items"></div>

<!-- Total Box Centered -->
<div class="center-box">
  <div class="total-box text-center">
    <h4>Total: <span id="total">0€</span></h4>
    <button class="btn btn-danger" onclick="clearCart()">Clear Cart</button>
    <a href="checkout.html" class="btn btn-success mt-2">Checkout</a>
  </div>
</div>

<!-- Footer -->
<footer>
  © 2026 Paw Paradise
</footer>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Group same items for quantity
function groupCart(cart){
  let grouped = {};
  cart.forEach(item=>{
    if(grouped[item.name]){
      grouped[item.name].qty++;
    } else {
      grouped[item.name] = {...item, qty:1};
    }
  });
  return Object.values(grouped);
}

function renderCart(){
  const container = document.getElementById("cart-items");
  container.innerHTML = "";
  let grouped = groupCart(cart);
  let total = 0;

  grouped.forEach(item=>{
    let price = parseFloat(item.price.replace("€",""));
    let itemTotal = price * item.qty;
    total += itemTotal;

    container.innerHTML += `
      <div class="cart-item">
        <div class="d-flex align-items-center gap-3">
          <img src="${item.image}">
          <div>
            <b>${item.name}</b><br>
            ${price}€ x ${item.qty}
          </div>
        </div>
        <div>
          <button class="btn btn-sm btn-secondary quantity-btn" onclick="decrease('${item.name}')">-</button>
          <button class="btn btn-sm btn-secondary quantity-btn" onclick="increase('${item.name}')">+</button>
          <button class="btn btn-sm btn-danger" onclick="removeItem('${item.name}')">Remove</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2) + "€";
  updateCartCount();
}

// Quantity functions
function increase(name){
  let item = cart.find(p=>p.name===name);
  if(item) cart.push(item);
  saveCart();
}
function decrease(name){
  let index = cart.findIndex(p=>p.name===name);
  if(index > -1) cart.splice(index,1);
  saveCart();
}
function removeItem(name){
  cart = cart.filter(p=>p.name !== name);
  saveCart();
}
function clearCart(){
  cart = [];
  localStorage.removeItem("cart");
  renderCart();
}
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// Update cart count in navbar
function updateCartCount(){
  const cartBtn = document.querySelector(".navbar .btn-success");
  if(cartBtn) cartBtn.innerText = "Checkout (" + cart.length + ")";
}

renderCart();
</script>

</body>
</html>

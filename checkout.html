<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Paw Paradise</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  min-height: 100vh;
}

/* Navbar */
.navbar {
  backdrop-filter: blur(10px);
}

/* Hero heading */
.hero-heading {
  text-align: center;
  margin: 60px 0 40px;
}
.hero-heading h2 {
  font-size: 2.5rem;
  font-weight: bold;
  text-shadow: 1px 1px 8px rgba(0,0,0,0.5);
}

/* Checkout card */
.checkout-card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  max-width: 500px;
  margin: 0 auto 40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.checkout-card input {
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
}

.checkout-card input::placeholder {
  color: #e0e0e0;
}

.checkout-card button {
  border-radius: 10px;
  margin-top: 10px;
}

/* Total */
#total {
  text-align: center;
  margin: 20px 0;
  font-size: 1.2rem;
  font-weight: bold;
  color: #28a745;
}

/* Footer */
footer {
  color: white;
  background: rgba(0,0,0,0.2);
  padding: 20px 0;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
  <a class="navbar-brand fw-bold" href="index.html">🐾Paw Paradise -  Everything Your Pet Needs🐾</a>
  <div class="ms-auto">
    <a href="index.html" class="btn btn-light btn-sm mx-1">Home</a>
    <a href="products.html" class="btn btn-light btn-sm mx-1">Products</a>
    <a href="cart.html" class="btn btn-warning btn-sm mx-1" id="cart">🛒 Cart (0)</a>
  </div>
</nav>

<!-- Hero Heading -->
<div class="container hero-heading">
  <h2>Checkout 💳</h2>
  <p class="lead">Complete your purchase for your beloved pets!</p>
</div>

<!-- Checkout Form -->
<div class="checkout-card">
  <div id="total"></div>

  <form onsubmit="pay(event)">
    <input class="form-control mb-3" placeholder="Full Name" required>
    <input class="form-control mb-3" placeholder="Card Number" required>
    <input class="form-control mb-3" placeholder="Address" required>
    <button class="btn btn-success w-100">Pay Now</button>
  </form>
</div>

<!-- Footer -->
<footer class="text-center">
  © 2026 Paw Paradise
</footer>

<script>
// Cart and total calculation
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

// Calculate total using price as number
cart.forEach(item => {
  // Remove € and convert to number
  let priceNum = parseFloat(item.price.replace("€",""));
  total += priceNum;
});

// Display total
document.getElementById("total").innerText = "Total to Pay: " + total.toFixed(2) + "€";

// Update cart count
function updateCartCount() {
  document.getElementById("cart").innerText = "🛒 Cart (" + cart.length + ")";
}
updateCartCount();

// Pay function
function pay(e) {
  e.preventDefault();

  if(cart.length === 0){
    alert("Your cart is empty! Add products first 🛒");
    return;
  }

  alert("Payment Successful 🎉");

  localStorage.removeItem("cart");
  updateCartCount();

  window.location.href = "index.html";
}
</script>

</body>
</html>

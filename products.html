/* DISPLAY PRODUCTS */
function displayProducts(items){
  const container = document.getElementById("products-container");
  container.innerHTML = "";
  items.forEach(p=>{
    container.innerHTML += `
      <div class="product-card text-center p-2">
        <img src="${p.image}">
        <h6>${p.name}</h6>
        <p class="text-light small">${p.description}</p>
        <p class="price">${p.price}</p>
        <button class="btn btn-success w-100" onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
      </div>
    `;
  });
}

/* ADD TO CART */
function addToCart(product){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
}

/* FILTER LOGIC */
function applyFilters(){
  let filtered = products;
  if(currentCategory !== "all"){
    filtered = filtered.filter(p => p.category === currentCategory);
  }
  if(searchValue){
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(searchValue)
    );
  }
  displayProducts(filtered);
}

/* CATEGORY CLICK */
document.querySelectorAll(".category-filters button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    currentCategory = btn.getAttribute("data-category");
    document.querySelectorAll(".category-filters button").forEach(b=>b.classList.remove("btn-primary"));
    btn.classList.add("btn-primary");
    applyFilters();
  });
});

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function(){
  searchValue = this.value.toLowerCase();
  applyFilters();
});

/* INIT */
displayProducts(products);
